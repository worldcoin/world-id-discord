version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    cooldown:
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      security-updates:
        applies-to: 'security-updates'
        patterns:
          - '*'
      routine-updates:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      major-updates:
        applies-to: 'version-updates'
        update-types:
          - 'major'
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '06:30'
      timezone: 'UTC'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'chore(ci-deps)'
